name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Skill version
      description: Output of `cat ~/.claude/skills/agentkey/version` or the tag you installed
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Agent host
      options:
        - Claude Code (CLI)
        - Claude Desktop (macOS)
        - Claude Desktop (Windows)
        - Cursor
        - Other (specify below)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `...`
        2. Ask the agent `...`
        3. See error `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: MCP logs or agent transcripts. Redact any API keys.
      render: shell
